# ========================
# SERVER CONFIGURATION
# ========================
server.port=8081
spring.application.name=SmartBankingSystem

# ========================
# MYSQL DATABASE CONFIG
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_banking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE CONFIG
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Hibernate 6+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=SmartBankingSystem2026SecureJWTSecretKey256BitsLongEnoughForHMACSHA
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ========================
# CORS CONFIGURATION
# ========================
cors.allowed-origins=http://localhost:5173,http://localhost:5180,http://localhost:3000,http://localhost:5174

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ========================
# OTP CONFIGURATION
# ========================
otp.expiration-minutes=15
otp.length=6

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bankingsystem=DEBUG