# ========================
# SERVER CONFIGURATION
# ========================
server.port=8081
spring.application.name=SmartBankingSystem

# ========================
# H2 DATABASE CONFIG
# ========================
spring.datasource.url=jdbc:h2:mem:smart_banking_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / HIBERNATE CONFIG
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Hibernate 6+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=SmartBankingSystem2026SecureJWTSecretKey256BitsLongEnoughForHMACSHA
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ========================
# CORS CONFIGURATION
# ========================
cors.allowed-origins=http://localhost:5173,http://localhost:5180,http://localhost:3000,http://localhost:5174,http://localhost:5175,http://localhost:5176

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ========================
# OTP CONFIGURATION
# ========================
otp.expiration-minutes=15
otp.length=6

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bankingsystem=DEBUG